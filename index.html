<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Robin Apps</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Robin Apps">
</head>

<body>

<div id="launcher" class="screen">

    <h1>Robin Apps</h1>

    <div class="card" onclick="showScreen('hello')">
        <h2>Hello World</h2>
        <p>Test-App</p>
    </div>

    <div class="card" onclick="showScreen('fitness')">
        <h2>Fitness Tracker</h2>
        <p>Kalorien & Makros</p>
    </div>

</div>

<div id="hello" class="screen hidden">

    <button onclick="showScreen('launcher')">
        ← Zurück
    </button>

    <h1>Hello World 👋</h1>

</div>

<div id="fitness" class="screen hidden">

    <button onclick="showScreen('launcher')">
        ← Zurück
    </button>

    <h1>Fitness Tracker</h1>

    <div class="tabs">

        <button onclick="showFitnessTab('today')">
            Heute
        </button>

        <button onclick="showFitnessTab('history')">
            Verlauf
        </button>

        <button onclick="showFitnessTab('weight')">
            Gewicht
        </button>

        <button onclick="showFitnessTab('settings')">
            Ziele
        </button>

    </div>

    <div id="tab-today" class="fitness-tab">

        <div class="stats">

            <div class="stat">
                <span>Kalorien</span>
                <strong id="totalCalories">0</strong>
                <small id="calorieGoal"></small>
            </div>

            <div class="stat">
                <span>Protein</span>
                <strong id="totalProtein">0g</strong>
                <small id="proteinGoal"></small>
            </div>

            <div class="stat">
                <span>Carbs</span>
                <strong id="totalCarbs">0g</strong>
            </div>

            <div class="stat">
                <span>Fett</span>
                <strong id="totalFat">0g</strong>
            </div>

        </div>

        <div class="quick-actions">

            <button>
                📷 Foto
            </button>

            <button>
                📦 Barcode
            </button>

        </div>

        <h2>Essen hinzufügen</h2>

        <input id="foodName" placeholder="Name">

        <input
            id="foodCalories"
            type="number"
            placeholder="Kalorien"
        >

        <input
            id="foodProtein"
            type="number"
            placeholder="Protein"
        >

        <input
            id="foodCarbs"
            type="number"
            placeholder="Carbs"
        >

        <input
            id="foodFat"
            type="number"
            placeholder="Fett"
        >

        <button onclick="addFood()">
            Speichern
        </button>

        <div id="foodList"></div>

    </div>

    <div
        id="tab-history"
        class="fitness-tab hidden"
    >

        <h2>Verlauf</h2>

        <div id="historyList"></div>

    </div>

    <div
        id="tab-weight"
        class="fitness-tab hidden"
    >

        <h2>Gewicht</h2>

        <input
            id="weightInput"
            type="number"
            step="0.1"
            placeholder="82.5"
        >

        <button onclick="addWeight()">
            Gewicht speichern
        </button>

        <div id="weightList"></div>

    </div>

    <div
        id="tab-settings"
        class="fitness-tab hidden"
    >

        <h2>Ziele</h2>

        <input
            id="goalCalories"
            type="number"
            placeholder="Kalorienziel"
        >

        <input
            id="goalProtein"
            type="number"
            placeholder="Proteinziel"
        >

        <button onclick="saveGoals()">
            Ziele speichern
        </button>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
